name: gates
# Deterministic build-time gates (edge-lint, grade-vocab-guard, entries-partition
# completeness) all run inside `astro build`. A green build == all gates green.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-gates:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site/app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm ci || npm install
      - name: Build (runs edge-lint · grade-vocab-guard · entries-partition)
        run: npm run build
